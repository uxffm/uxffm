[build]
  publish = "dist"
  # Build, then regenerate the single sitemap.xml so it auto-updates on every
  # deploy (i.e. whenever a new post is published).
  command = "npm run sitemap"

[build.environment]
  NODE_VERSION = "22"

[build.processing.html]
  pretty_urls = false

# Redirects live in public/_redirects (single source of truth).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
