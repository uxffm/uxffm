name: Daily SEO Community Post

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate SEO post from community discussions
        run: node scripts/generate-seo-post.mjs
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}

      - name: Commit and push post
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Publish daily SEO community post'
          file_pattern: 'src/content/post/*.md'
